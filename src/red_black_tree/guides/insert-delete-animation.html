<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Red-Black Tree Insert/Delete Animation</title>
<style>
  :root {
    --bg: #0f172a;
    --bg2: #111827;
    --surface: #1f2937;
    --surface-soft: #243244;
    --accent: #f97316;
    --accent2: #22c55e;
    --text: #e5e7eb;
    --text-dim: #94a3b8;
    --edge: #475569;
    --gold: #facc15;
    --danger: #ef4444;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: "SF Mono", "Fira Code", "Cascadia Code", monospace;
    background:
      radial-gradient(circle at 20% 20%, rgba(249, 115, 22, 0.12), transparent 35%),
      radial-gradient(circle at 80% 10%, rgba(34, 197, 94, 0.1), transparent 35%),
      linear-gradient(160deg, var(--bg), var(--bg2));
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  h1 {
    text-align: center;
    padding: 26px 12px 8px;
    font-size: 1.55rem;
    letter-spacing: 1px;
    background: linear-gradient(90deg, #fb923c, #facc15, #4ade80);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .subtitle {
    text-align: center;
    color: var(--text-dim);
    font-size: 0.9rem;
    margin-bottom: 16px;
    padding: 0 12px;
  }

  .toolbar {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    justify-content: center;
    align-items: center;
    margin: 8px 0 18px;
    padding: 0 14px;
  }

  .case-overview {
    max-width: 980px;
    margin: 0 auto 14px;
    padding: 0 18px;
  }

  .case-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 10px;
  }

  .case-box {
    background: linear-gradient(145deg, rgba(31, 41, 55, 0.9), rgba(23, 34, 49, 0.9));
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 10px;
    padding: 10px 12px;
  }

  .case-box-title {
    color: #fcd34d;
    font-size: 0.84rem;
    margin-bottom: 6px;
  }

  .case-box ul {
    margin-left: 16px;
    color: #cbd5e1;
    font-size: 0.82rem;
    line-height: 1.55;
  }

  .tab-btn {
    padding: 10px 24px;
    border: 2px solid #fb923c;
    background: transparent;
    color: #fdba74;
    border-radius: 10px;
    font-family: inherit;
    font-size: 0.95rem;
    cursor: pointer;
    transition: all 0.25s;
  }

  .tab-btn.active,
  .tab-btn:hover {
    background: linear-gradient(135deg, #f97316, #ea580c);
    color: #fff;
    box-shadow: 0 0 16px rgba(249, 115, 22, 0.35);
  }

  .scenario-select {
    min-width: 280px;
    padding: 10px 12px;
    border-radius: 10px;
    border: 1px solid rgba(255, 255, 255, 0.14);
    background: var(--surface);
    color: var(--text);
    font-family: inherit;
    font-size: 0.9rem;
  }

  .container {
    max-width: 980px;
    margin: 0 auto;
    padding: 0 18px 40px;
  }

  .canvas-wrap {
    background: linear-gradient(145deg, rgba(31, 41, 55, 0.95), rgba(36, 50, 68, 0.92));
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 16px;
    overflow: hidden;
    margin-bottom: 16px;
  }

  canvas {
    display: block;
    width: 100%;
    height: 440px;
  }

  .info {
    background: linear-gradient(145deg, rgba(31, 41, 55, 0.92), rgba(23, 34, 49, 0.92));
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 12px;
    padding: 18px 20px;
    min-height: 128px;
  }

  .step-title {
    color: var(--gold);
    margin-bottom: 8px;
    font-size: 1rem;
  }

  .step-desc {
    color: var(--text-dim);
    line-height: 1.65;
    font-size: 0.9rem;
    margin-bottom: 8px;
  }

  .code-line {
    color: #86efac;
    background: rgba(255, 255, 255, 0.06);
    display: inline-block;
    border-radius: 6px;
    padding: 4px 8px;
    font-size: 0.84rem;
  }

  .reason-title,
  .vars-title {
    margin-top: 12px;
    margin-bottom: 6px;
    font-size: 0.83rem;
    color: #cbd5e1;
  }

  .step-why {
    color: #cbd5e1;
    line-height: 1.65;
    font-size: 0.88rem;
    background: rgba(255, 255, 255, 0.04);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 8px;
    padding: 10px 12px;
  }

  .vars-map {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .var-chip {
    padding: 5px 10px;
    border-radius: 999px;
    background: rgba(56, 189, 248, 0.12);
    border: 1px solid rgba(56, 189, 248, 0.35);
    color: #bae6fd;
    font-size: 0.8rem;
  }

  .controls {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    align-items: center;
    gap: 12px;
    margin: 18px 0 12px;
  }

  .ctrl-btn {
    border: none;
    border-radius: 9px;
    padding: 10px 18px;
    font-family: inherit;
    font-size: 0.9rem;
    cursor: pointer;
    transition: all 0.22s;
  }

  .ctrl-btn.primary {
    background: linear-gradient(135deg, #16a34a, #15803d);
    color: #fff;
  }

  .ctrl-btn.secondary {
    background: #334155;
    color: #cbd5e1;
  }

  .ctrl-btn:hover:not(:disabled) {
    transform: translateY(-1px);
    filter: brightness(1.08);
  }

  .ctrl-btn:disabled {
    opacity: 0.42;
    cursor: not-allowed;
    transform: none;
  }

  .dots {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: #334155;
    transition: all 0.25s;
  }

  .dot.done { background: #22c55e; }
  .dot.active {
    background: var(--gold);
    transform: scale(1.35);
    box-shadow: 0 0 10px rgba(250, 204, 21, 0.6);
  }

  .legend {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 16px;
    color: var(--text-dim);
    font-size: 0.8rem;
  }

  .legend span {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .swatch {
    width: 12px;
    height: 12px;
    border-radius: 3px;
    display: inline-block;
  }

  @media (max-width: 760px) {
    canvas { height: 360px; }
    .tab-btn { padding: 9px 18px; }
    .scenario-select { width: 100%; }
    .toolbar { flex-direction: column; }
    .case-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<h1>Red-Black Tree Insert / Delete 动画</h1>
<div class="subtitle">依据 red_black.mbt 中的 insert / fix_insert / delete / fix_delete 逻辑拆步演示</div>

<div class="toolbar">
  <button class="tab-btn active" data-mode="insert" onclick="switchMode('insert')">Insert</button>
  <button class="tab-btn" data-mode="delete" onclick="switchMode('delete')">Delete</button>
  <select id="scenarioSelect" class="scenario-select" onchange="switchScenario(this.value)"></select>
</div>

<div class="case-overview">
  <div class="case-grid">
    <div class="case-box">
      <div class="case-box-title">Insert 全部分支（源码对应）</div>
      <ul id="insertCaseList"></ul>
    </div>
    <div class="case-box">
      <div class="case-box-title">Delete 全部分支（源码对应）</div>
      <ul id="deleteCaseList"></ul>
    </div>
  </div>
</div>

<div class="container">
  <div class="canvas-wrap">
    <canvas id="treeCanvas"></canvas>
  </div>

  <div class="info">
    <div class="step-title" id="stepTitle"></div>
    <div class="step-desc" id="stepDesc"></div>
    <div class="code-line" id="codeLine"></div>
    <div class="reason-title">这一步为什么这样做</div>
    <div class="step-why" id="stepWhy"></div>
    <div class="vars-title">变量对应（本步）</div>
    <div class="vars-map" id="varsMap"></div>
  </div>

  <div class="controls">
    <button class="ctrl-btn secondary" id="btnReset" onclick="resetAnim()">Reset</button>
    <button class="ctrl-btn secondary" id="btnPrev" onclick="prevStep()">Prev</button>
    <div class="dots" id="dots"></div>
    <button class="ctrl-btn primary" id="btnNext" onclick="nextStep()">Next</button>
    <button class="ctrl-btn secondary" id="btnAuto" onclick="autoPlay()">Auto</button>
  </div>

  <div class="legend">
    <span><span class="swatch" style="background:#ef4444"></span>Red node (R)</span>
    <span><span class="swatch" style="background:#111827;border:1px solid #cbd5e1"></span>Black node (B)</span>
    <span><span class="swatch" style="background:#facc15"></span>Current focus</span>
    <span><span class="swatch" style="background:#22c55e"></span>New / updated edge</span>
  </div>
</div>

<script>
const canvas = document.getElementById('treeCanvas');
const ctx = canvas.getContext('2d');
const DPR = window.devicePixelRatio || 1;
const NODE_R = 22;

let mode = 'insert';
let scenarioId = '';
let currentStep = 0;
let prevStepSnapshot = null;
let targetStepSnapshot = null;
let animProgress = 1;
let animating = false;
let rafId = null;
let autoTimer = null;

const SCENES = {
  insert: [
    {
      id: 'ins_case1',
      name: 'Insert Case 1: 叔叔红（重着色上推）',
      steps: [
        {
          title: 'Step 0 - BST 插入前状态',
          desc: '父节点 p=5 与叔叔 u=15 都是红色的典型场景，准备插入 z=1。',
          code: 'while color(z.parent) is Red { ... }',
          nodes: {
            n10: N(0.50, 0.17, 'B', '10'),
            n5: N(0.33, 0.40, 'R', '5'),
            n15: N(0.67, 0.40, 'R', '15'),
            n1: N(0.20, 0.65, 'R', '1', 0)
          },
          edges: [E('n10','n5'), E('n10','n15')],
          hiNodes: ['n5','n15']
        },
        {
          title: 'Step 1 - BST 插入 z=1（红）',
          desc: 'insert 先按 BST 落位，z 作为 p 的左孩子插入。',
          code: 'z.parent = parent; p.left = Some(z)',
          nodes: {
            n10: N(0.50, 0.17, 'B', '10'),
            n5: N(0.33, 0.40, 'R', '5'),
            n15: N(0.67, 0.40, 'R', '15'),
            n1: N(0.20, 0.65, 'R', '1', 1)
          },
          edges: [E('n10','n5'), E('n10','n15'), E('n5','n1','new')],
          hiNodes: ['n1','n5']
        },
        {
          title: 'Step 2 - Case 1: color(u) is Red',
          desc: 'fix_insert 命中叔叔红分支：p/u 变黑，g 变红，z 上移到 g。',
          code: 'p.color = Black; u.color = Black; g.color = Red; z = g',
          nodes: {
            n10: N(0.50, 0.17, 'R', '10'),
            n5: N(0.33, 0.40, 'B', '5'),
            n15: N(0.67, 0.40, 'B', '15'),
            n1: N(0.20, 0.65, 'R', '1')
          },
          edges: [E('n10','n5'), E('n10','n15'), E('n5','n1')],
          hiNodes: ['n10','n5','n15']
        },
        {
          title: 'Step 3 - 根节点强制变黑',
          desc: '循环结束后统一执行 root 置黑，保证红黑树性质 2。',
          code: 'self.root.unwrap().color = Black',
          nodes: {
            n10: N(0.50, 0.17, 'B', '10'),
            n5: N(0.33, 0.40, 'B', '5'),
            n15: N(0.67, 0.40, 'B', '15'),
            n1: N(0.20, 0.65, 'R', '1')
          },
          edges: [E('n10','n5'), E('n10','n15'), E('n5','n1')],
          hiNodes: ['n10']
        }
      ]
    },
    {
      id: 'ins_case23',
      name: 'Insert Case 2+3: 内拐先旋再外拐',
      steps: [
        {
          title: 'Step 0 - BST 插入后（内拐）',
          desc: 'z=8 是 p=5 的右孩子，p 在 g=10 左侧，且叔叔 u=15 为黑。',
          code: 'if is_left_child(p) && !is_left_child(z) { ... }',
          nodes: {
            n10: N(0.50, 0.17, 'B', '10'),
            n5: N(0.34, 0.40, 'R', '5'),
            n15: N(0.68, 0.40, 'B', '15'),
            n8: N(0.44, 0.66, 'R', '8')
          },
          edges: [E('n10','n5'), E('n10','n15'), E('n5','n8')],
          hiNodes: ['n8','n5','n10']
        },
        {
          title: 'Step 1 - Case 2: z = p; left_rotate(z)',
          desc: '先把内拐结构旋成外拐，便于下一步 Case 3 处理。',
          code: 'z = p; self.left_rotate(z)',
          nodes: {
            n10: N(0.50, 0.17, 'B', '10'),
            n8: N(0.34, 0.40, 'R', '8'),
            n15: N(0.68, 0.40, 'B', '15'),
            n5: N(0.24, 0.66, 'R', '5')
          },
          edges: [E('n10','n8','new'), E('n10','n15'), E('n8','n5','new')],
          hiNodes: ['n8','n5']
        },
        {
          title: 'Step 2 - Case 3: 重新着色',
          desc: 'p=8 置黑，g=10 置红，准备对 g 做右旋。',
          code: 'p.color = Black; g.color = Red',
          nodes: {
            n10: N(0.50, 0.17, 'R', '10'),
            n8: N(0.34, 0.40, 'B', '8'),
            n15: N(0.68, 0.40, 'B', '15'),
            n5: N(0.24, 0.66, 'R', '5')
          },
          edges: [E('n10','n8'), E('n10','n15'), E('n8','n5')],
          hiNodes: ['n10','n8']
        },
        {
          title: 'Step 3 - Case 3: right_rotate(g)',
          desc: '外拐场景执行右旋，8 上升为局部根。',
          code: 'self.right_rotate(g)',
          nodes: {
            n8: N(0.50, 0.17, 'B', '8'),
            n5: N(0.33, 0.40, 'R', '5'),
            n10: N(0.67, 0.40, 'R', '10'),
            n15: N(0.79, 0.66, 'B', '15')
          },
          edges: [E('n8','n5','new'), E('n8','n10','new'), E('n10','n15')],
          hiNodes: ['n8','n10']
        },
        {
          title: 'Step 4 - 根节点保持黑色',
          desc: '最终再次确保 root 为黑色，插入修复完成。',
          code: 'self.root.unwrap().color = Black',
          nodes: {
            n8: N(0.50, 0.17, 'B', '8'),
            n5: N(0.33, 0.40, 'R', '5'),
            n10: N(0.67, 0.40, 'R', '10'),
            n15: N(0.79, 0.66, 'B', '15')
          },
          edges: [E('n8','n5'), E('n8','n10'), E('n10','n15')],
          hiNodes: ['n8']
        }
      ]
    },
    {
      id: 'ins_mirror_case23',
      name: 'Insert 镜像 Case 2+3: 右侧内拐',
      steps: [
        {
          title: 'Step 0 - 镜像内拐（父在祖父右侧）',
          desc: 'z=12 是 p=15 的左孩子，p 在 g=10 右侧，叔叔 u=5 为黑。',
          code: 'else { if is_left_child(z) { z = p; self.right_rotate(z) } ... }',
          nodes: {
            n10: N(0.50, 0.17, 'B', '10'),
            n5: N(0.32, 0.40, 'B', '5'),
            n15: N(0.68, 0.40, 'R', '15'),
            n12: N(0.58, 0.66, 'R', '12')
          },
          edges: [E('n10','n5'), E('n10','n15'), E('n15','n12')],
          hiNodes: ['n12','n15','n10']
        },
        {
          title: 'Step 1 - 镜像 Case 2: z=p, right_rotate(p)',
          desc: '内拐先对父节点右旋，转成外拐结构。',
          code: 'z = p; self.right_rotate(z)',
          nodes: {
            n10: N(0.50, 0.17, 'B', '10'),
            n5: N(0.32, 0.40, 'B', '5'),
            n12: N(0.68, 0.40, 'R', '12'),
            n15: N(0.78, 0.66, 'R', '15')
          },
          edges: [E('n10','n5'), E('n10','n12','new'), E('n12','n15','new')],
          hiNodes: ['n12','n15']
        },
        {
          title: 'Step 2 - 镜像 Case 3: 重新着色',
          desc: 'p=12 置黑，g=10 置红，准备左旋 g。',
          code: 'p.color = Black; g.color = Red',
          nodes: {
            n10: N(0.50, 0.17, 'R', '10'),
            n5: N(0.32, 0.40, 'B', '5'),
            n12: N(0.68, 0.40, 'B', '12'),
            n15: N(0.78, 0.66, 'R', '15')
          },
          edges: [E('n10','n5'), E('n10','n12'), E('n12','n15')],
          hiNodes: ['n10','n12']
        },
        {
          title: 'Step 3 - 镜像 Case 3: left_rotate(g)',
          desc: '对祖父做左旋，12 成为局部根。',
          code: 'self.left_rotate(g)',
          nodes: {
            n12: N(0.50, 0.17, 'B', '12'),
            n10: N(0.33, 0.40, 'R', '10'),
            n15: N(0.67, 0.40, 'R', '15'),
            n5: N(0.22, 0.66, 'B', '5')
          },
          edges: [E('n12','n10','new'), E('n12','n15','new'), E('n10','n5')],
          hiNodes: ['n12','n10']
        },
        {
          title: 'Step 4 - 根节点保持黑色',
          desc: '收尾步骤与左侧分支一致。',
          code: 'self.root.unwrap().color = Black',
          nodes: {
            n12: N(0.50, 0.17, 'B', '12'),
            n10: N(0.33, 0.40, 'R', '10'),
            n15: N(0.67, 0.40, 'R', '15'),
            n5: N(0.22, 0.66, 'B', '5')
          },
          edges: [E('n12','n10'), E('n12','n15'), E('n10','n5')],
          hiNodes: ['n12']
        }
      ]
    },
    {
      id: 'ins_no_fix',
      name: 'Insert 快速路径: 父节点黑，无需修复',
      steps: [
        {
          title: 'Step 0 - 插入前',
          desc: 'p=5 是黑色，插入 z=7 后不会触发 while 修复。',
          code: 'if color(z.parent) is Black { return }',
          nodes: {
            n10: N(0.50, 0.17, 'B', '10'),
            n5: N(0.34, 0.40, 'B', '5'),
            n15: N(0.68, 0.40, 'B', '15'),
            n7: N(0.46, 0.66, 'R', '7', 0)
          },
          edges: [E('n10','n5'), E('n10','n15')],
          hiNodes: ['n5']
        },
        {
          title: 'Step 1 - BST 插入 z=7',
          desc: 'z 作为红色新节点挂到父节点下面。',
          code: 'p.right = Some(z)',
          nodes: {
            n10: N(0.50, 0.17, 'B', '10'),
            n5: N(0.34, 0.40, 'B', '5'),
            n15: N(0.68, 0.40, 'B', '15'),
            n7: N(0.46, 0.66, 'R', '7', 1)
          },
          edges: [E('n10','n5'), E('n10','n15'), E('n5','n7','new')],
          hiNodes: ['n7','n5']
        },
        {
          title: 'Step 2 - 父黑直接返回',
          desc: '命中快速路径，不进入 fix_insert。',
          code: 'if color(z.parent) is Black { return }',
          nodes: {
            n10: N(0.50, 0.17, 'B', '10'),
            n5: N(0.34, 0.40, 'B', '5'),
            n15: N(0.68, 0.40, 'B', '15'),
            n7: N(0.46, 0.66, 'R', '7')
          },
          edges: [E('n10','n5'), E('n10','n15'), E('n5','n7')],
          hiNodes: ['n5']
        }
      ]
    }
  ],

  delete: [
    {
      id: 'del_case12',
      name: 'Delete Case 1+2: 兄弟红 -> 双黑侄',
      steps: [
        {
          title: 'Step 0 - 删除黑叶节点 z',
          desc: 'delete 找到 z=5（黑），删除后 x=NIL，需进入 fix_delete。',
          code: 'if y_original_color is Black { self.fix_delete(x, x_parent) }',
          nodes: {
            n10: N(0.45, 0.20, 'B', '10'),
            n5: N(0.28, 0.44, 'B', '5'),
            n15: N(0.62, 0.44, 'R', '15'),
            n12: N(0.54, 0.68, 'B', '12'),
            n18: N(0.72, 0.68, 'B', '18'),
            nx: N(0.28, 0.44, 'B', 'x=NIL', 0)
          },
          edges: [E('n10','n5'), E('n10','n15'), E('n15','n12'), E('n15','n18')],
          hiNodes: ['n5']
        },
        {
          title: 'Step 1 - transplant 后 x 在左侧（NIL）',
          desc: 'x 是 p=10 的左侧空位，兄弟 w=15 为红，命中 Case 1。',
          code: 'if color(w) is Red { ... }',
          nodes: {

    'Case 1 的目标是把“红兄弟”变成“黑兄弟”场景，后续才能统一处理。',
    'Case 2 表示兄弟及其孩子都黑，只能把问题继续上推到父节点。',
    '循环退出后把 x 染黑，彻底消掉额外黑色。'
  ],
  del_case34: [
    'Case 3 前提：兄弟黑、近侄红、远侄黑。直接收敛还不行，需要先变形。',
    '先旋兄弟把近侄转成远侄，这是从 Case 3 过渡到 Case 4 的关键步骤。',
    'Case 4 才是最终收敛步骤：通过重着色 + 旋转恢复两侧黑高一致。',
    '把 x 设为 root 后循环自然终止，修复完成。'
  ],
  del_bst_paths: [
    '先明确 delete 的第一层是 BST 结构处理，不是直接进 fix_delete。',
    '两子节点分支会选择后继 y（右子树最小）作为替身；本例特意选 y=z.right。',
    '直接右孩子分支不需要执行 y.right = z.right，否则会形成 y.right = Some(y) 的自环风险。',
    '如果是 0/1 子节点分支，逻辑更短：直接 transplant，必要时才 fix_delete。'
  ],
  del_two_children_deep_successor: [
    '先构造你提到的“复杂情况”：后继 y 不在 z 的右孩子位置，而在更深层。',
    '这一步拿齐关键变量 y/x/y_original_color，后面所有修复都依赖它们。',
    '条件判断失败后进入 else 分支，这正是复杂情况与简单情况的分叉点。',
    '必须先 transplant(y, y.right)，否则 y 直接上移会导致原位置断链或重复引用。',
    '再让 y 接管 z 的位置与右子树，确保 BST 结构仍然正确。',
    '最后补齐左子树与颜色继承，结构删除完成；是否进入 fix_delete 由 y_original_color 决定。'
  ],
  del_mirror_case34: [
    '这是 fix_delete 的右侧镜像分支，和左侧 case34 对称。',
    '镜像 Case 3 先 left_rotate(w) 进行形态转换。',
    '镜像 Case 4 再 right_rotate(p) 收敛并恢复黑高。',
    '最后令 x 到 root，循环停止。'
  ]
};

function N(x, y, rb, label, visible = 1) {
  return { x, y, rb, label, visible };
}

function E(from, to, kind = 'normal') {
  return { from, to, kind };
}

function resizeCanvas() {
  const rect = canvas.getBoundingClientRect();
  canvas.width = rect.width * DPR;
  canvas.height = rect.height * DPR;
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
}

window.addEventListener('resize', () => {
  resizeCanvas();
  draw();
});

function activeScenes() {
  return SCENES[mode];
}

function activeScene() {
  return activeScenes().find((s) => s.id === scenarioId) || activeScenes()[0];
}

function maxStep() {
  return activeScene().steps.length - 1;
}

function currentSnapshot() {
  if (!prevStepSnapshot || !targetStepSnapshot || animProgress >= 1) return targetStepSnapshot;
  const t = easeInOut(animProgress);
  const result = {
    title: targetStepSnapshot.title,
    desc: targetStepSnapshot.desc,
    code: targetStepSnapshot.code,
    edges: targetStepSnapshot.edges,
    hiNodes: targetStepSnapshot.hiNodes || []
  };

  const ids = new Set([
    ...Object.keys(prevStepSnapshot.nodes || {}),
    ...Object.keys(targetStepSnapshot.nodes || {})
  ]);

  result.nodes = {};
  ids.forEach((id) => {
    const pa = prevStepSnapshot.nodes[id] || fallbackNode(targetStepSnapshot.nodes[id]);
    const pb = targetStepSnapshot.nodes[id] || fallbackNode(prevStepSnapshot.nodes[id]);
    result.nodes[id] = {
      x: lerp(pa.x, pb.x, t),
      y: lerp(pa.y, pb.y, t),
      rb: t < 0.5 ? pa.rb : pb.rb,
      label: pb.label || pa.label || id,
      visible: lerp(pa.visible ?? 1, pb.visible ?? 1, t)
    };
  });

  return result;
}

function fallbackNode(base) {
  if (!base) return { x: 0.5, y: 0.86, rb: 'B', label: '', visible: 0 };
  return { x: base.x, y: base.y, rb: base.rb, label: base.label, visible: 0 };
}

function lerp(a, b, t) {
  return a + (b - a) * t;
}

function easeInOut(t) {
  return t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t;
}

function edgeKey(e) {
  return `${e.from}->${e.to}`;
}

function draw() {
  const W = canvas.getBoundingClientRect().width;
  const H = canvas.getBoundingClientRect().height;
  ctx.clearRect(0, 0, W, H);

  const shot = currentSnapshot();
  if (!shot) return;

  const nodes = shot.nodes || {};
  const hiSet = new Set(shot.hiNodes || []);
  const step = activeScene().steps[currentStep];
  const bindings = inferVarBindings(step);
  const nodeTags = groupVarTagsByNode(bindings);

  // edges
  (shot.edges || []).forEach((e) => {
    const a = nodes[e.from];
    const b = nodes[e.to];
    if (!a || !b) return;
    if ((a.visible ?? 1) < 0.05 || (b.visible ?? 1) < 0.05) return;

    const x1 = a.x * W;
    const y1 = a.y * H;
    const x2 = b.x * W;
    const y2 = b.y * H;

    ctx.save();
    ctx.globalAlpha = Math.min(a.visible, b.visible);
    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.lineTo(x2, y2);

    if (e.kind === 'new') {
      ctx.strokeStyle = '#22c55e';
      ctx.lineWidth = 3;
      ctx.setLineDash([7, 4]);
    } else {
      ctx.strokeStyle = '#475569';
      ctx.lineWidth = 2;
      ctx.setLineDash([]);
    }
    ctx.stroke();
    ctx.setLineDash([]);

    // arrow
    const angle = Math.atan2(y2 - y1, x2 - x1);
    const tipX = x2 - NODE_R * Math.cos(angle);
    const tipY = y2 - NODE_R * Math.sin(angle);
    const size = 9;

    ctx.beginPath();
    ctx.moveTo(tipX, tipY);
    ctx.lineTo(tipX - size * Math.cos(angle - 0.4), tipY - size * Math.sin(angle - 0.4));
    ctx.lineTo(tipX - size * Math.cos(angle + 0.4), tipY - size * Math.sin(angle + 0.4));
    ctx.closePath();
    ctx.fillStyle = e.kind === 'new' ? '#22c55e' : '#64748b';
    ctx.fill();
    ctx.restore();
  });

  // nodes
  Object.keys(nodes).forEach((id) => {
    const n = nodes[id];
    const alpha = n.visible ?? 1;
    if (alpha < 0.04) return;

    const cx = n.x * W;
    const cy = n.y * H;
    const isHi = hiSet.has(id);

    ctx.save();
    ctx.globalAlpha = alpha;

    if (isHi) {
      ctx.beginPath();
      ctx.arc(cx, cy, NODE_R + 9, 0, Math.PI * 2);
      const glow = ctx.createRadialGradient(cx, cy, NODE_R, cx, cy, NODE_R + 14);
      glow.addColorStop(0, 'rgba(250,204,21,0.35)');
      glow.addColorStop(1, 'rgba(250,204,21,0)');
      ctx.fillStyle = glow;
      ctx.fill();
    }

    const isRed = n.rb === 'R';
    const nodeFill = isRed ? '#ef4444' : '#0b1220';
    const nodeStroke = isHi ? '#facc15' : (isRed ? '#fecaca' : '#cbd5e1');

    ctx.beginPath();
    ctx.arc(cx, cy, NODE_R, 0, Math.PI * 2);
    ctx.fillStyle = nodeFill;
    ctx.fill();
    ctx.lineWidth = isHi ? 3 : 2;
    ctx.strokeStyle = nodeStroke;
    ctx.stroke();

    // Main value label
    ctx.fillStyle = '#f8fafc';
    ctx.font = 'bold 13px "SF Mono", "Fira Code", monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(n.label, cx, cy + 3);

    // Explicit color marker so red/black status is obvious at a glance.
    ctx.font = 'bold 10px "SF Mono", "Fira Code", monospace';
    ctx.fillStyle = isRed ? '#7f1d1d' : '#93c5fd';
    ctx.fillText(isRed ? 'R' : 'B', cx, cy - 10);

    ctx.restore();

    const tags = nodeTags[id] || [id];
    if (tags.length > 0) {
      const tagText = tags.join(',');
      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.font = 'bold 10px "SF Mono", "Fira Code", monospace';
      const tw = ctx.measureText(tagText).width + 10;
      const tx = cx - tw / 2;
      const ty = cy - NODE_R - 18;

      ctx.fillStyle = 'rgba(15, 23, 42, 0.95)';
      ctx.strokeStyle = '#38bdf8';
      ctx.lineWidth = 1;
      roundRect(ctx, tx, ty, tw, 14, 6);
      ctx.fill();
      ctx.stroke();

      ctx.fillStyle = '#7dd3fc';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(tagText, cx, ty + 7);
      ctx.restore();
    }
  });
}

function roundRect(c, x, y, w, h, r) {
  c.beginPath();
  c.moveTo(x + r, y);
  c.arcTo(x + w, y, x + w, y + h, r);
  c.arcTo(x + w, y + h, x, y + h, r);
  c.arcTo(x, y + h, x, y, r);
  c.arcTo(x, y, x + w, y, r);
  c.closePath();
}

function inferVarBindings(step) {
  const scene = activeScene();
  const sceneVars = STEP_VARS[scene.id] || [];
  const explicit = sceneVars[currentStep] || {};
  const nodes = step.nodes || {};
  const resolved = {};
  const coreOrder = ['z', 'p', 'u', 'b', 'g', 'x', 'xp', 'w', 'wl', 'wr', 'y'];

  coreOrder.forEach((v) => {
    const nodeId = explicit[v] || null;
    if (!nodeId || !nodes[nodeId]) {
      resolved[v] = { value: null, nodeId: null };
      return;
    }
    const label = String(nodes[nodeId].label || '').trim();
    resolved[v] = { value: label, nodeId };
  });
  return resolved;
}

function groupVarTagsByNode(bindings) {
  const map = {};
  Object.entries(bindings).forEach(([v, info]) => {
    if (!info || !info.nodeId) return;
    if (!map[info.nodeId]) map[info.nodeId] = [];
    map[info.nodeId].push(v);
  });
  return map;
}

function whyForStep(step) {
  if (step.why) return step.why;
  const scene = activeScene();
  const list = STEP_WHY_DETAIL[scene.id] || [];
  return list[currentStep] || '这一步是在为下一步的旋转或重着色创造可处理形态，目标是保持 BST 有序并修复红黑性质。';
}

function renderVars(step) {
  const el = document.getElementById('varsMap');
  const bindings = inferVarBindings(step);
  const order = ['z', 'p', 'u', 'b', 'g', 'x', 'xp', 'w', 'wl', 'wr', 'y'];
  el.innerHTML = '';
  order.forEach((v) => {
    const info = bindings[v];
    const chip = document.createElement('span');
    chip.className = 'var-chip';
    chip.textContent = `${v} = ${info && info.value ? info.value : '本步未使用'}`;
    el.appendChild(chip);
  });
}

function renderCaseOverview() {
  const ins = document.getElementById('insertCaseList');
  const del = document.getElementById('deleteCaseList');
  ins.innerHTML = '';
  del.innerHTML = '';

  SCENES.insert.forEach((s) => {
    const li = document.createElement('li');
    li.textContent = s.name;
    ins.appendChild(li);
  });

  SCENES.delete.forEach((s) => {
    const li = document.createElement('li');
    li.textContent = s.name;
    del.appendChild(li);
  });
}

function animate() {
  if (animProgress >= 1) {
    animating = false;
    updateUI();
    draw();
    return;
  }
  animProgress = Math.min(1, animProgress + 0.035);
  draw();
  rafId = requestAnimationFrame(animate);
}

function goToStep(stepIdx) {
  const steps = activeScene().steps;
  const next = Math.max(0, Math.min(stepIdx, steps.length - 1));
  prevStepSnapshot = targetStepSnapshot || steps[currentStep];
  currentStep = next;
  targetStepSnapshot = steps[currentStep];
  animProgress = 0;
  animating = true;
  updateUI();
  if (rafId) cancelAnimationFrame(rafId);
  animate();
}

function buildScenarioOptions() {
  const sel = document.getElementById('scenarioSelect');
  const scenes = activeScenes();
  sel.innerHTML = '';
  scenes.forEach((s) => {
    const op = document.createElement('option');
    op.value = s.id;
    op.textContent = s.name;
    sel.appendChild(op);
  });

  if (!scenes.some((s) => s.id === scenarioId)) {
    scenarioId = scenes[0].id;
  }
  sel.value = scenarioId;
}

function buildDots() {
  const dotWrap = document.getElementById('dots');
  dotWrap.innerHTML = '';
  for (let i = 0; i <= maxStep(); i++) {
    const d = document.createElement('div');
    d.className = 'dot';
    dotWrap.appendChild(d);
  }
}

function updateUI() {
  const step = activeScene().steps[currentStep];
  document.getElementById('stepTitle').textContent = `${step.title} (${currentStep}/${maxStep()})`;
  document.getElementById('stepDesc').textContent = step.desc;
  document.getElementById('codeLine').textContent = step.code;
  document.getElementById('stepWhy').textContent = whyForStep(step);
  renderVars(step);

  document.getElementById('btnPrev').disabled = currentStep === 0 || animating;
  document.getElementById('btnNext').disabled = currentStep >= maxStep() || animating;

  const dots = document.getElementById('dots').children;
  for (let i = 0; i < dots.length; i++) {
    dots[i].className = 'dot' + (i < currentStep ? ' done' : '') + (i === currentStep ? ' active' : '');
  }
}

function resetAnim() {
  stopAuto();
  currentStep = 0;
  const first = activeScene().steps[0];
  prevStepSnapshot = first;
  targetStepSnapshot = first;
  animProgress = 1;
  animating = false;
  buildDots();
  updateUI();
  draw();
}

function nextStep() {
  if (animating || currentStep >= maxStep()) return;
  goToStep(currentStep + 1);
}

function prevStep() {
  if (animating || currentStep <= 0) return;
  goToStep(currentStep - 1);
}

function stopAuto() {
  if (autoTimer) {
    clearInterval(autoTimer);
    autoTimer = null;
  }
}

function autoPlay() {
  if (autoTimer) {
    stopAuto();
    return;
  }

  if (currentStep >= maxStep()) {
    resetAnim();
  }

  autoTimer = setInterval(() => {
    if (animating) return;
    if (currentStep >= maxStep()) {
      stopAuto();
      return;
    }
    nextStep();
  }, 1200);
}

function switchMode(m) {
  mode = m;
  document.querySelectorAll('.tab-btn').forEach((btn) => {
    btn.classList.toggle('active', btn.dataset.mode === mode);
  });
  stopAuto();
  buildScenarioOptions();
  resetAnim();
}

function switchScenario(id) {
  scenarioId = id;
  stopAuto();
  resetAnim();
}

// keyboard
window.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight' || e.key === ' ') {
    e.preventDefault();
    nextStep();
  }
  if (e.key === 'ArrowLeft') {
    e.preventDefault();
    prevStep();
  }
  if (e.key === 'r' || e.key === 'R') {
    resetAnim();
  }
});

// init
resizeCanvas();
scenarioId = SCENES.insert[0].id;
renderCaseOverview();
buildScenarioOptions();
resetAnim();
</script>

</body>
