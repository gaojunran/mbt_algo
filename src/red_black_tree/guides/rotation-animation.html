<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Red-Black Tree Rotation Animation</title>
<style>
  :root {
    --bg: #1a1a2e;
    --surface: #16213e;
    --accent: #e94560;
    --accent2: #0f3460;
    --text: #eee;
    --text-dim: #8892b0;
    --node-black: #2c2c3a;
    --node-red: #e94560;
    --edge: #4a5568;
    --highlight: #ffd700;
    --green: #48bb78;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  h1 {
    text-align: center;
    padding: 24px 0 8px;
    font-size: 1.6rem;
    letter-spacing: 2px;
    background: linear-gradient(135deg, var(--accent), #ff6b6b);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .tab-bar {
    display: flex;
    justify-content: center;
    gap: 12px;
    margin: 16px 0 24px;
  }

  .tab-btn {
    padding: 10px 32px;
    border: 2px solid var(--accent);
    border-radius: 8px;
    background: transparent;
    color: var(--accent);
    font-size: 1rem;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.3s;
  }

  .tab-btn.active, .tab-btn:hover {
    background: var(--accent);
    color: #fff;
    box-shadow: 0 0 20px rgba(233, 69, 96, 0.3);
  }

  .container {
    max-width: 900px;
    margin: 0 auto;
    padding: 0 20px 40px;
  }

  .canvas-wrap {
    position: relative;
    background: var(--surface);
    border-radius: 16px;
    border: 1px solid rgba(255,255,255,0.06);
    overflow: hidden;
    margin-bottom: 20px;
  }

  canvas {
    display: block;
    width: 100%;
    height: 420px;
  }

  .step-info {
    background: var(--surface);
    border-radius: 12px;
    padding: 20px 24px;
    border: 1px solid rgba(255,255,255,0.06);
    margin-bottom: 20px;
    min-height: 100px;
  }

  .step-info .step-title {
    font-size: 1.05rem;
    color: var(--highlight);
    margin-bottom: 8px;
  }

  .step-info .step-desc {
    color: var(--text-dim);
    line-height: 1.7;
    font-size: 0.92rem;
  }

  .step-info .step-desc code {
    background: rgba(255,255,255,0.08);
    padding: 2px 7px;
    border-radius: 4px;
    color: var(--green);
    font-family: inherit;
  }

  .controls {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
  }

  .ctrl-btn {
    padding: 10px 24px;
    border: none;
    border-radius: 8px;
    font-size: 0.95rem;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.25s;
  }

  .ctrl-btn.primary {
    background: var(--accent);
    color: #fff;
  }

  .ctrl-btn.primary:hover {
    box-shadow: 0 0 16px rgba(233,69,96,0.4);
    transform: translateY(-1px);
  }

  .ctrl-btn.secondary {
    background: var(--accent2);
    color: #ccc;
  }

  .ctrl-btn.secondary:hover {
    background: #1a4a80;
  }

  .ctrl-btn:disabled {
    opacity: 0.35;
    cursor: not-allowed;
    transform: none !important;
    box-shadow: none !important;
  }

  .step-dots {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--accent2);
    transition: all 0.3s;
  }

  .dot.active {
    background: var(--highlight);
    box-shadow: 0 0 8px rgba(255,215,0,0.5);
    transform: scale(1.3);
  }

  .dot.done {
    background: var(--green);
  }

  .legend {
    display: flex;
    justify-content: center;
    gap: 24px;
    margin-top: 16px;
    font-size: 0.82rem;
    color: var(--text-dim);
  }

  .legend span {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .legend-swatch {
    width: 14px; height: 14px;
    border-radius: 3px;
    display: inline-block;
  }
</style>
</head>
<body>

<h1>🌳 Red-Black Tree Rotation</h1>

<div class="tab-bar">
  <button class="tab-btn active" onclick="switchMode('left')">← Left Rotate</button>
  <button class="tab-btn" onclick="switchMode('right')">Right Rotate →</button>
</div>

<div class="container">
  <div class="canvas-wrap">
    <canvas id="treeCanvas"></canvas>
  </div>

  <div class="step-info" id="stepInfo">
    <div class="step-title" id="stepTitle">Step 0 / 6 — Initial State</div>
    <div class="step-desc" id="stepDesc">Click <strong>Next Step</strong> to begin the rotation animation.</div>
  </div>

  <div class="controls">
    <button class="ctrl-btn secondary" id="btnReset" onclick="resetAnim()">⟲ Reset</button>
    <button class="ctrl-btn secondary" id="btnPrev" onclick="prevStep()" disabled>◀ Prev</button>
    <div class="step-dots" id="stepDots"></div>
    <button class="ctrl-btn primary" id="btnNext" onclick="nextStep()">Next Step ▶</button>
    <button class="ctrl-btn secondary" id="btnAuto" onclick="autoPlay()">▶▶ Auto Play</button>
  </div>

  <div class="legend">
    <span><span class="legend-swatch" style="background:#ffd700"></span> Highlighted (active pointer)</span>
    <span><span class="legend-swatch" style="background:#e94560"></span> Moving node</span>
    <span><span class="legend-swatch" style="background:#4a5568"></span> Normal edge</span>
  </div>
</div>

<script>
// ============================================================
// Configuration & State
// ============================================================
const canvas = document.getElementById('treeCanvas');
const ctx = canvas.getContext('2d');

let mode = 'left'; // 'left' | 'right'
let currentStep = 0;
let animating = false;
let autoTimer = null;

const DPR = window.devicePixelRatio || 1;

function resizeCanvas() {
  const rect = canvas.getBoundingClientRect();
  canvas.width = rect.width * DPR;
  canvas.height = rect.height * DPR;
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
}

window.addEventListener('resize', () => { resizeCanvas(); draw(); });

// ============================================================
// Node positions for each step (left rotate)
// Positions are in percentage of canvas: [xPct, yPct]
// Nodes: p, x, y, a, b, c
// ============================================================

// Helper: convert pct to px
function px(pctX, pctY) {
  const rect = canvas.getBoundingClientRect();
  return [rect.width * pctX, rect.height * pctY];
}

const NODE_R = 24;

// --- Left Rotate positions ---
// step 0: initial tree
//        p
//        |
//        x
//       / \
//      a   y
//         / \
//        b   c

const leftPositions = [
  // step 0: initial
  { p:[0.50,0.08], x:[0.50,0.25], y:[0.68,0.45], a:[0.32,0.45], b:[0.58,0.65], c:[0.78,0.65] },
  // step 1: highlight y = x.right
  { p:[0.50,0.08], x:[0.50,0.25], y:[0.68,0.45], a:[0.32,0.45], b:[0.58,0.65], c:[0.78,0.65] },
  // step 2: x.right = b (b moves to y's old spot conceptually, edge changes)
  { p:[0.50,0.08], x:[0.50,0.25], y:[0.72,0.35], a:[0.32,0.45], b:[0.65,0.45], c:[0.82,0.55] },
  // step 3: b.parent = x (just highlight, same positions)
  { p:[0.50,0.08], x:[0.50,0.25], y:[0.72,0.35], a:[0.32,0.45], b:[0.65,0.45], c:[0.82,0.55] },
  // step 4: y.parent = p
  { p:[0.50,0.08], x:[0.42,0.35], y:[0.58,0.25], a:[0.28,0.55], b:[0.52,0.55], c:[0.72,0.45] },
  // step 5: p.child = y (p -> y link)
  { p:[0.50,0.08], x:[0.42,0.35], y:[0.50,0.25], a:[0.28,0.55], b:[0.52,0.55], c:[0.68,0.45] },
  // step 6: y.left = x, x.parent = y — final
  { p:[0.50,0.08], x:[0.32,0.45], y:[0.50,0.25], a:[0.20,0.65], b:[0.44,0.65], c:[0.68,0.45] },
];

// --- Right Rotate positions ---
//        p
//        |
//        y
//       / \
//      x   c
//     / \
//    a   b

const rightPositions = [
  // step 0: initial
  { p:[0.50,0.08], y:[0.50,0.25], x:[0.32,0.45], c:[0.68,0.45], a:[0.20,0.65], b:[0.44,0.65] },
  // step 1: highlight x = y.left
  { p:[0.50,0.08], y:[0.50,0.25], x:[0.32,0.45], c:[0.68,0.45], a:[0.20,0.65], b:[0.44,0.65] },
  // step 2: y.left = b
  { p:[0.50,0.08], y:[0.50,0.25], x:[0.28,0.35], c:[0.68,0.45], a:[0.18,0.55], b:[0.38,0.45] },
  // step 3: b.parent = y
  { p:[0.50,0.08], y:[0.50,0.25], x:[0.28,0.35], c:[0.68,0.45], a:[0.18,0.55], b:[0.38,0.45] },
  // step 4: x.parent = p
  { p:[0.50,0.08], y:[0.58,0.35], x:[0.42,0.25], c:[0.72,0.55], a:[0.28,0.45], b:[0.52,0.55] },
  // step 5: p.child = x
  { p:[0.50,0.08], y:[0.58,0.35], x:[0.50,0.25], c:[0.72,0.55], a:[0.32,0.45], b:[0.52,0.55] },
  // step 6: x.right = y, y.parent = x — final
  { p:[0.50,0.08], y:[0.68,0.45], x:[0.50,0.25], c:[0.80,0.65], a:[0.32,0.45], b:[0.56,0.65] },
];

// Step descriptions
const leftSteps = [
  { title: 'Step 0 / 6 — Initial State',
    desc: 'The tree before rotation. Node <code>x</code> has right child <code>y</code>. We want to rotate <code>x</code> left so that <code>y</code> rises and <code>x</code> sinks.' },
  { title: 'Step 1 / 6 — Take y = x.right',
    desc: 'Grab a reference to <code>y = x.right</code>. This is the node that will rise to take <code>x</code>\'s position. No pointers are changed yet.' },
  { title: 'Step 2 / 6 — x.right = y.left (b)',
    desc: 'Transplant <code>y</code>\'s left subtree <code>b</code> to become <code>x</code>\'s new right child: <code>x.right = y.left</code>. Node <code>b</code> moves from under <code>y</code> to under <code>x</code>.' },
  { title: 'Step 3 / 6 — b.parent = x',
    desc: 'If <code>b</code> is not NIL, update its parent pointer: <code>b.parent = x</code>. This completes the transplant of subtree <code>b</code>.' },
  { title: 'Step 4 / 6 — y.parent = x.parent (p)',
    desc: '<code>y</code> takes over <code>x</code>\'s position in the tree. Set <code>y.parent = x.parent</code> (i.e. <code>p</code>). Node <code>y</code> starts rising.' },
  { title: 'Step 5 / 6 — Update p\'s child pointer → y',
    desc: 'Update <code>p</code>\'s child pointer to point to <code>y</code> instead of <code>x</code>:<br>• If <code>x</code> was root → <code>tree.root = y</code><br>• If <code>x == p.left</code> → <code>p.left = y</code><br>• If <code>x == p.right</code> → <code>p.right = y</code>' },
  { title: 'Step 6 / 6 — y.left = x, x.parent = y ✅',
    desc: 'Finally, make <code>x</code> the left child of <code>y</code>: <code>y.left = x</code> and <code>x.parent = y</code>. Rotation complete! BST order is preserved: <code>a &lt; x &lt; b &lt; y &lt; c</code>.' },
];

const rightSteps = [
  { title: 'Step 0 / 6 — Initial State',
    desc: 'The tree before rotation. Node <code>y</code> has left child <code>x</code>. We want to rotate <code>y</code> right so that <code>x</code> rises and <code>y</code> sinks.' },
  { title: 'Step 1 / 6 — Take x = y.left',
    desc: 'Grab a reference to <code>x = y.left</code>. This is the node that will rise to take <code>y</code>\'s position. No pointers are changed yet.' },
  { title: 'Step 2 / 6 — y.left = x.right (b)',
    desc: 'Transplant <code>x</code>\'s right subtree <code>b</code> to become <code>y</code>\'s new left child: <code>y.left = x.right</code>. Node <code>b</code> moves from under <code>x</code> to under <code>y</code>.' },
  { title: 'Step 3 / 6 — b.parent = y',
    desc: 'If <code>b</code> is not NIL, update its parent pointer: <code>b.parent = y</code>. This completes the transplant of subtree <code>b</code>.' },
  { title: 'Step 4 / 6 — x.parent = y.parent (p)',
    desc: '<code>x</code> takes over <code>y</code>\'s position in the tree. Set <code>x.parent = y.parent</code> (i.e. <code>p</code>). Node <code>x</code> starts rising.' },
  { title: 'Step 5 / 6 — Update p\'s child pointer → x',
    desc: 'Update <code>p</code>\'s child pointer to point to <code>x</code> instead of <code>y</code>:<br>• If <code>y</code> was root → <code>tree.root = x</code><br>• If <code>y == p.left</code> → <code>p.left = x</code><br>• If <code>y == p.right</code> → <code>p.right = x</code>' },
  { title: 'Step 6 / 6 — x.right = y, y.parent = x ✅',
    desc: 'Finally, make <code>y</code> the right child of <code>x</code>: <code>x.right = y</code> and <code>y.parent = x</code>. Rotation complete! BST order is preserved: <code>a &lt; x &lt; b &lt; y &lt; c</code>.' },
];

// Edges for each step
// Each edge: [fromNode, toNode, style]
// style: 'normal' | 'highlight' | 'new' | 'removed'

function getLeftEdges(step) {
  const E = [];
  // p -> pivot child
  if (step <= 4) E.push(['p','x','normal']);
  if (step >= 5) E.push(['p','y', step === 5 ? 'new' : 'normal']);

  // x -> a (always)
  E.push(['x','a','normal']);

  // x -> y or x -> b
  if (step <= 1) E.push(['x','y','normal']);
  if (step >= 2) E.push(['x','b', step <= 3 ? 'new' : 'normal']);

  // y -> b or not
  if (step <= 1) E.push(['y','b','normal']);

  // y -> c (always)
  E.push(['y','c','normal']);

  // y -> x (step 6)
  if (step >= 6) E.push(['y','x','new']);

  return E;
}

function getRightEdges(step) {
  const E = [];
  // p -> pivot child
  if (step <= 4) E.push(['p','y','normal']);
  if (step >= 5) E.push(['p','x', step === 5 ? 'new' : 'normal']);

  // y -> c (always)
  E.push(['y','c','normal']);

  // y -> x or y -> b
  if (step <= 1) E.push(['y','x','normal']);
  if (step >= 2) E.push(['y','b', step <= 3 ? 'new' : 'normal']);

  // x -> a (always)
  E.push(['x','a','normal']);

  // x -> b or not
  if (step <= 1) E.push(['x','b','normal']);

  // x -> y (step 6)
  if (step >= 6) E.push(['x','y','new']);

  return E;
}

// Highlight info per step
function getLeftHighlights(step) {
  switch(step) {
    case 1: return { nodes: ['y'], label: 'y = x.right' };
    case 2: return { nodes: ['b'], label: 'x.right = b' };
    case 3: return { nodes: ['b'], label: 'b.parent = x' };
    case 4: return { nodes: ['y'], label: 'y.parent = p' };
    case 5: return { nodes: ['y','p'], label: 'p.child → y' };
    case 6: return { nodes: ['x','y'], label: 'y.left = x' };
    default: return { nodes: [], label: '' };
  }
}

function getRightHighlights(step) {
  switch(step) {
    case 1: return { nodes: ['x'], label: 'x = y.left' };
    case 2: return { nodes: ['b'], label: 'y.left = b' };
    case 3: return { nodes: ['b'], label: 'b.parent = y' };
    case 4: return { nodes: ['x'], label: 'x.parent = p' };
    case 5: return { nodes: ['x','p'], label: 'p.child → x' };
    case 6: return { nodes: ['x','y'], label: 'x.right = y' };
    default: return { nodes: [], label: '' };
  }
}

// ============================================================
// Animation (lerp between steps)
// ============================================================
let animProgress = 1; // 0..1, 1 = fully at currentStep
let prevPositions = null;
let targetPositions = null;
let rafId = null;

function getPositions() {
  return mode === 'left' ? leftPositions : rightPositions;
}

function getSteps() {
  return mode === 'left' ? leftSteps : rightSteps;
}

function getEdges(step) {
  return mode === 'left' ? getLeftEdges(step) : getRightEdges(step);
}

function getHighlights(step) {
  return mode === 'left' ? getLeftHighlights(step) : getRightHighlights(step);
}

function lerp(a, b, t) {
  return a + (b - a) * t;
}

function easeInOut(t) {
  return t < 0.5 ? 2*t*t : -1+(4-2*t)*t;
}

function getCurrentPositions() {
  if (!prevPositions || !targetPositions || animProgress >= 1) return targetPositions;
  const t = easeInOut(animProgress);
  const result = {};
  for (const key of Object.keys(targetPositions)) {
    result[key] = [
      lerp(prevPositions[key][0], targetPositions[key][0], t),
      lerp(prevPositions[key][1], targetPositions[key][1], t),
    ];
  }
  return result;
}

// ============================================================
// Drawing
// ============================================================
const nodeLabels = {
  p: { label: 'p', color: '#718096' },
  x: { label: 'x', color: '#e94560' },
  y: { label: 'y', color: '#4299e1' },
  a: { label: 'a', color: '#718096' },
  b: { label: 'b', color: '#d69e2e' },
  c: { label: 'c', color: '#718096' },
};

function draw() {
  const W = canvas.getBoundingClientRect().width;
  const H = canvas.getBoundingClientRect().height;
  ctx.clearRect(0, 0, W, H);

  const pos = getCurrentPositions();
  if (!pos) return;

  const highlights = getHighlights(currentStep);
  const edges = getEdges(currentStep);

  // Resolve positions to pixels
  const pxPos = {};
  for (const key of Object.keys(pos)) {
    pxPos[key] = [pos[key][0] * W, pos[key][1] * H];
  }

  // Draw edges
  for (const [from, to, style] of edges) {
    const [x1, y1] = pxPos[from];
    const [x2, y2] = pxPos[to];

    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.lineTo(x2, y2);

    if (style === 'new') {
      ctx.strokeStyle = '#ffd700';
      ctx.lineWidth = 3;
      ctx.setLineDash([6, 4]);
    } else if (style === 'removed') {
      ctx.strokeStyle = 'rgba(233,69,96,0.3)';
      ctx.lineWidth = 2;
      ctx.setLineDash([4, 4]);
    } else {
      ctx.strokeStyle = '#4a5568';
      ctx.lineWidth = 2;
      ctx.setLineDash([]);
    }
    ctx.stroke();
    ctx.setLineDash([]);

    // Arrow head
    const angle = Math.atan2(y2 - y1, x2 - x1);
    const headLen = 10;
    const arrowX = x2 - NODE_R * Math.cos(angle);
    const arrowY = y2 - NODE_R * Math.sin(angle);
    ctx.beginPath();
    ctx.moveTo(arrowX, arrowY);
    ctx.lineTo(arrowX - headLen * Math.cos(angle - 0.35), arrowY - headLen * Math.sin(angle - 0.35));
    ctx.lineTo(arrowX - headLen * Math.cos(angle + 0.35), arrowY - headLen * Math.sin(angle + 0.35));
    ctx.closePath();
    ctx.fillStyle = style === 'new' ? '#ffd700' : '#4a5568';
    ctx.fill();
  }

  // Draw nodes
  const nodeOrder = ['a', 'b', 'c', 'p', 'x', 'y'];
  for (const key of nodeOrder) {
    const [cx, cy] = pxPos[key];
    const info = nodeLabels[key];
    const isHighlighted = highlights.nodes.includes(key);

    // Glow
    if (isHighlighted) {
      ctx.beginPath();
      ctx.arc(cx, cy, NODE_R + 8, 0, Math.PI * 2);
      const grad = ctx.createRadialGradient(cx, cy, NODE_R, cx, cy, NODE_R + 12);
      grad.addColorStop(0, 'rgba(255,215,0,0.4)');
      grad.addColorStop(1, 'rgba(255,215,0,0)');
      ctx.fillStyle = grad;
      ctx.fill();
    }

    // Circle
    ctx.beginPath();
    ctx.arc(cx, cy, NODE_R, 0, Math.PI * 2);
    ctx.fillStyle = isHighlighted ? '#2d3748' : '#1e2433';
    ctx.fill();
    ctx.lineWidth = isHighlighted ? 3 : 2;
    ctx.strokeStyle = isHighlighted ? '#ffd700' : info.color;
    ctx.stroke();

    // Label
    ctx.fillStyle = isHighlighted ? '#ffd700' : info.color;
    ctx.font = 'bold 18px "SF Mono", "Fira Code", monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(info.label, cx, cy);
  }

  // Step label overlay
  if (highlights.label) {
    ctx.font = '14px "SF Mono", "Fira Code", monospace';
    ctx.fillStyle = 'rgba(255,215,0,0.85)';
    ctx.textAlign = 'center';
    ctx.fillText(highlights.label, W / 2, H - 20);
  }
}

function animateTransition() {
  if (animProgress >= 1) {
    animating = false;
    draw();
    return;
  }
  animProgress = Math.min(1, animProgress + 0.025);
  draw();
  rafId = requestAnimationFrame(animateTransition);
}

function goToStep(step) {
  const positions = getPositions();
  prevPositions = getCurrentPositions() || positions[currentStep];
  currentStep = step;
  targetPositions = positions[step];
  animProgress = 0;
  animating = true;

  updateUI();
  if (rafId) cancelAnimationFrame(rafId);
  animateTransition();
}

// ============================================================
// UI
// ============================================================
function buildDots() {
  const container = document.getElementById('stepDots');
  container.innerHTML = '';
  for (let i = 0; i <= 6; i++) {
    const dot = document.createElement('div');
    dot.className = 'dot' + (i === currentStep ? ' active' : '') + (i < currentStep ? ' done' : '');
    container.appendChild(dot);
  }
}

function updateUI() {
  const steps = getSteps();
  document.getElementById('stepTitle').textContent = steps[currentStep].title;
  document.getElementById('stepDesc').innerHTML = steps[currentStep].desc;

  document.getElementById('btnPrev').disabled = currentStep === 0;
  document.getElementById('btnNext').disabled = currentStep === 6;

  // dots
  const dots = document.getElementById('stepDots').children;
  for (let i = 0; i < dots.length; i++) {
    dots[i].className = 'dot' + (i === currentStep ? ' active' : '') + (i < currentStep ? ' done' : '');
  }
}

function nextStep() {
  if (currentStep >= 6 || animating) return;
  goToStep(currentStep + 1);
}

function prevStep() {
  if (currentStep <= 0 || animating) return;
  goToStep(currentStep - 1);
}

function resetAnim() {
  if (autoTimer) { clearInterval(autoTimer); autoTimer = null; }
  goToStep(0);
}

function autoPlay() {
  if (autoTimer) { clearInterval(autoTimer); autoTimer = null; return; }
  if (currentStep >= 6) goToStep(0);
  autoTimer = setInterval(() => {
    if (currentStep >= 6 || animating) {
      if (currentStep >= 6) { clearInterval(autoTimer); autoTimer = null; }
      return;
    }
    nextStep();
  }, 1200);
}

function switchMode(m) {
  mode = m;
  document.querySelectorAll('.tab-btn').forEach((btn, i) => {
    btn.classList.toggle('active', (i === 0 && m === 'left') || (i === 1 && m === 'right'));
  });
  if (autoTimer) { clearInterval(autoTimer); autoTimer = null; }
  currentStep = 0;
  targetPositions = getPositions()[0];
  prevPositions = targetPositions;
  animProgress = 1;
  buildDots();
  updateUI();
  draw();
}

// Keyboard support
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); nextStep(); }
  if (e.key === 'ArrowLeft') { e.preventDefault(); prevStep(); }
  if (e.key === 'r' || e.key === 'R') resetAnim();
});

// Init
resizeCanvas();
targetPositions = getPositions()[0];
prevPositions = targetPositions;
buildDots();
updateUI();
draw();
</script>

</body>
</html>
